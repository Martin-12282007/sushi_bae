<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sushi Bae - Order Fresh Sushi Bake</title>
    <!-- Use a🍣 emoji as favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍣</text></svg>">
  </head>
  <body class="bg-[#FFF9F1] text-[#1C2430]">
    <div id="root"></div>
    <script>
      // Clear any previously registered service workers (like Flutter's old service worker)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function() {
              console.log('Unregistered old service worker successfully.');
              window.location.reload();
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
